<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Parlour — Preserving Family Legacy</title>

  <!-- Fonts (placeholders — replaced in the design-system pass) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Base styles + per-fold split -->
  <link rel="stylesheet" href="/css/base.css" />
  <!-- Saved by the ?dev nav editor; must load after base.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/site.overrides.css" />
  <link rel="stylesheet" href="/css/folds/home.css" />
  <!-- Saved by the ?dev Home editor; must load after home.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/home.overrides.css" />
  <!-- Saved by the ?dev Home layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/home.layout.css" />
  <link rel="stylesheet" href="/css/folds/about.css" />
  <!-- Saved by the ?dev About editor; must load after about.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/about.overrides.css" />
  <!-- Saved by the ?dev About layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/about.layout.css" />
  <link rel="stylesheet" href="/css/folds/services.css" />
  <!-- Saved by the ?dev Services editor; must load after services.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/services.overrides.css" />
  <!-- Saved by the ?dev Services layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/services.layout.css" />
  <link rel="stylesheet" href="/css/folds/process.css" />
  <!-- Saved by the ?dev Process editor; must load after process.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/process.overrides.css" />
  <!-- Saved by the ?dev Process layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/process.layout.css" />
  <link rel="stylesheet" href="/css/folds/faqs.css" />
  <!-- Saved by the ?dev FAQ editor; must load after faqs.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/faqs.overrides.css" />
  <!-- Saved by the ?dev FAQ layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/faqs.layout.css" />
  <link rel="stylesheet" href="/css/folds/contact.css" />
  <!-- Saved by the ?dev Contact editor; must load after contact.css to win the cascade. -->
  <link rel="stylesheet" href="/css/folds/contact.overrides.css" />
  <!-- Saved by the ?dev Contact layout tool (desktop-gated position/width). -->
  <link rel="stylesheet" href="/css/folds/contact.layout.css" />
</head>
<body>
  <!-- Shared header (renders its own markup from content/site.json) -->
  <site-nav></site-nav>

  <!-- Single page: six full-viewport folds layered on top of each other.
       Only the active fold is visible; navigation crossfades between them. -->
  <main id="folds" class="folds">
    <!-- Home — real content, populated client-side by js/home.js -->
    <section class="fold" data-fold="home" id="fold-home" aria-label="Home">
      <div class="home" data-home-root>
        <h1 class="home__headline" data-home-headline></h1>
        <figure class="home__media" data-home-media></figure>
      </div>
    </section>

    <!-- About Us — real content, populated client-side by js/about.js -->
    <section class="fold" data-fold="about" id="fold-about" aria-label="About Us">
      <div class="about" data-about-root>
        <div class="about__video" data-about-media></div>
        <div class="about__bottom">
          <div class="about__poem" data-about-poem></div>
          <div class="about__heading" data-about-heading></div>
        </div>
      </div>
    </section>

    <!-- Services — real content, populated client-side by js/services.js.
         Internally-scrollable fold: the left list overflows; the controller
         hands off to Process/About at the list's bottom/top edges. -->
    <section class="fold" data-fold="services" id="fold-services" aria-label="Services">
      <div class="services" data-services-root>
        <div class="services__list" data-services-body></div>
        <div class="services__col">
          <div class="services__heading" data-services-heading></div>
          <figure class="services__media" data-services-media></figure>
        </div>
      </div>
    </section>

    <!-- Process — real content, populated client-side by js/process.js.
         Fits one viewport: text up top, a video band bleeding off the bottom. -->
    <section class="fold" data-fold="process" id="fold-process" aria-label="Process">
      <div class="process" data-process-root>
        <div class="process__top">
          <div class="process__intro">
            <div class="process__lede" data-process-lede></div>
            <ol class="process__steps" data-process-steps></ol>
          </div>
          <div class="process__heading" data-process-heading></div>
        </div>
        <div class="process__video" data-process-media></div>
      </div>
    </section>

    <!-- FAQs — real content, populated client-side by js/faqs.js.
         Three regions: full-height left image | centered Q&A | bottom-right
         heading. The header logo stays the shared default (solid dark ink). -->
    <section class="fold" data-fold="faqs" id="fold-faqs" aria-label="FAQs">
      <div class="faqs" data-faqs-root>
        <figure class="faqs__image" data-faqs-media></figure>
        <div class="faqs__main">
          <div class="faqs__list" data-faqs-list></div>
          <div class="faqs__heading" data-faqs-heading></div>
        </div>
      </div>
    </section>

    <!-- Contact Us — real content, populated client-side by js/contact.js.
         Three regions: lede + body (left) | Calendly inline embed (right) |
         heading (bottom-right). The embed is lazy-loaded on first enter via the
         fold lifecycle; empty url → placeholder block. -->
    <section class="fold" data-fold="contact" id="fold-contact" aria-label="Contact Us">
      <div class="contact" data-contact-root>
        <div class="contact__text">
          <p class="contact__lede" data-contact-lede></p>
          <div class="contact__body" data-contact-body></div>
        </div>
        <div class="contact__main">
          <div class="contact__embed" data-contact-media></div>
          <div class="contact__heading" data-contact-heading></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/nav.js" defer></script>
  <script src="/js/folds.js" defer></script>
  <!-- Shared media + heading renderers, used by about/services/process. -->
  <script src="/js/media.js" defer></script>
  <script src="/js/home.js" defer></script>
  <script src="/js/about.js" defer></script>

  <!-- Services renders markdown with an in-repo parser (no third-party dep). -->
  <script src="/js/services.js" defer></script>

  <!-- Process — JSON only. -->
  <script src="/js/process.js" defer></script>

  <!-- FAQs — Q&A + left image. The ?dev focal-point picker is fetched lazily by
       this script only when ?dev is present. -->
  <script src="/js/faqs.js" defer></script>

  <!-- Contact Us — lede + body + lazy Calendly inline embed. -->
  <script src="/js/contact.js" defer></script>
</body>
</html>
